version: '3.9'
services:
  backend:
    image: python:3.11
    working_dir: /app/backend
    volumes:
      - ./:/app
    environment:
      - DATABASE_URL=sqlite:///./news.db
    command: bash -lc "pip install -r requirements.txt && PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    working_dir: /app/frontend
    volumes:
      - ./:/app
    environment:
      - NEXT_PUBLIC_API_BASE=http://127.0.0.1:8000
    command: bash -lc "npm install && npm run dev"
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
      POSTGRES_DB: news
    ports:
      - "5432:5432"
